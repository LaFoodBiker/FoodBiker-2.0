<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FoodBiler KDS & POS</title>
    <!-- Firebase App y Realtime Database SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-accent: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --brand-color: #ff6f00;
            --brand-hover: #e65c00;
            --green-ok: #2e7d32;
            --yellow-warn: #fbc02d;
            --red-alert: #d32f2f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 70px;
        }

        /* BARRA SUPERIOR */
        header {
            background-color: var(--bg-secondary);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--brand-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-section h1 {
            font-size: 20px;
            color: var(--brand-color);
            font-weight: bold;
        }

        .logo-section span {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
            display: block;
        }

        /* NAVEGACIÓN DE ROLES INFALIBLE */
        .role-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-secondary);
            display: flex;
            justify-content: space-around;
            border-top: 1px solid var(--bg-accent);
            z-index: 1000;
        }

        .role-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px 8px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            flex: 1;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .role-btn.active {
            color: var(--brand-color);
            border-top: 3px solid var(--brand-color);
            background-color: rgba(255, 111, 0, 0.05);
        }

        /* VISTAS GENERALES */
        .view-panel {
            display: none;
            padding: 16px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .view-panel.active {
            display: block;
        }

        /* ESTILOS DE COMPONENTES INTERFACES */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        @media(min-width: 768px) {
            .grid-menu { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        }

        .card-item {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            border: 1px solid transparent;
            position: relative;
        }

        .card-item:active {
            transform: scale(0.98);
        }

        .card-item h3 {
            font-size: 15px;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .card-item p {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 12px;
            flex-grow: 1;
        }

        .card-item .price {
            color: var(--yellow-warn);
            font-weight: bold;
            font-size: 16px;
            align-self: flex-end;
        }

        /* MODAL DE PERSONALIZACIÓN */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 2000;
        }

        .modal-body {
            background-color: var(--bg-secondary);
            width: 100%;
            max-width: 500px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
            max-height: 85vh;
            overflow-y: auto;
        }

        @media(min-width: 600px) {
            .modal-overlay { align-items: center; }
            .modal-body { border-radius: 20px; }
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--bg-accent);
            padding-bottom: 8px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brand-color);
            margin: 15px 0 8px 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .options-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tag-btn {
            background-color: var(--bg-accent);
            border: 1px solid transparent;
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }

        .tag-btn.selected {
            background-color: rgba(255, 111, 0, 0.15);
            border-color: var(--brand-color);
            color: var(--brand-color);
        }

        .tag-btn.removed {
            background-color: rgba(211, 47, 47, 0.15);
            border-color: var(--red-alert);
            color: var(--red-alert);
            text-decoration: line-through;
        }

        /* SELECTORES DE MODALIDAD */
        .modalities-container {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .mod-btn {
            flex: 1;
            background-color: var(--bg-secondary);
            border: 1px solid var(--bg-accent);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            white-space: nowrap;
        }

        .mod-btn.active {
            background-color: var(--brand-color);
            border-color: var(--brand-color);
        }

        /* TEXTAREA NOTAS LIBRES */
        .text-input {
            width: 100%;
            background-color: var(--bg-primary);
            border: 1px solid var(--bg-accent);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            resize: none;
            margin-bottom: 15px;
            font-size: 13px;
        }

        /* BOTONES ACCION INFERIORES */
        .footer-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
        }

        .btn-brand { background-color: var(--brand-color); color: white; }
        .btn-green { background-color: var(--green-ok); color: white; }
        .btn-muted { background-color: var(--bg-accent); color: var(--text-main); }
        .btn-danger { background-color: var(--red-alert); color: white; }

        /* CATEGORIAS FILTROS DE MESA */
        .cat-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            margin-bottom: 12px;
        }

        /* CRONOMETRO ESTILOS SEMAFORO */
        .timer-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .timer-green { background-color: rgba(46, 125, 50, 0.2); color: #81c784; }
        .timer-yellow { background-color: rgba(251, 192, 45, 0.2); color: #fff176; }
        .timer-red { background-color: rgba(211, 47, 47, 0.2); color: #e57373; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* PANTALLA KDS COCINA */
        .kds-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .kds-ticket {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
            border-top: 4px solid var(--brand-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--bg-accent);
            padding-bottom: 8px;
        }

        .kds-item-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px dashed var(--bg-accent);
        }

        .kds-item-row.done span {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* COMPONENTES DE CAJA */
        .split-box {
            background-color: var(--bg-accent);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .input-group {
            margin-bottom: 10px;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        /* ALERTAS SIMPLES FLOTANTES */
        #toast {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            background-color: var(--brand-color);
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 5000;
            font-weight: bold;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="toast">Operación Exitosa</div>

    <header>
        <div class="logo-section">
            <h1 id="header-title">FoodBiler</h1>
            <span id="header-subtitle">Mesero</span>
        </div>
        <div id="global-status" style="font-size: 12px; color: var(--green-ok);">● Local (Sin Sincronizar)</div>
    </header>

    <!-- NAVEGACIÓN PRINCIPAL -->
    <nav class="role-nav">
        <button class="role-btn active" onclick="switchRole('mesero')">Mesero</button>
        <button class="role-btn" onclick="switchRole('cocina')">Cocina</button>
        <button class="role-btn" onclick="switchRole('caja')">Caja</button>
        <button class="role-btn" onclick="switchRole('admin')">Admin</button>
    </nav>

    <!-- ================= VISTA: MESERO ================= -->
    <main id="view-mesero" class="view-panel active">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <select id="waiter-table-select" class="text-input" style="width: auto; margin-bottom:0;" onchange="loadTableOrder()">
                <option value="Mesa 1">Mesa 1</option>
                <option value="Mesa 2">Mesa 2</option>
                <option value="Mesa 3">Mesa 3</option>
                <option value="Mesa 4">Mesa 4</option>
                <option value="Mesa 5">Mesa 5</option>
                <option value="Mesa 6">Mesa 6</option>
                <option value="Caja Rapida">⚡ Caja Rápida</option>
            </select>
            <div id="waiter-order-total" style="font-size: 20px; font-weight: bold; color: var(--yellow-warn);">S/ 0.00</div>
        </div>

        <!-- Selector de Modalidad -->
        <div class="modalities-container" id="waiter-modalities">
            <button class="mod-btn active" onclick="setModalidad('Salón')">🪑 Salón</button>
            <button class="mod-btn" onclick="setModalidad('Llevar')">🛍️ Llevar</button>
            <button class="mod-btn" onclick="setModalidad('Recojo')">📦 Recojo</button>
            <button class="mod-btn" onclick="setModalidad('Delivery')">🛵 Delivery</button>
        </div>

        <!-- Campos adicionales Caja Rápida o Delivery -->
        <div id="extra-fields-waiter" style="display:none; background: var(--bg-secondary); padding: 12px; border-radius:8px; margin-bottom:12px;">
            <div id="crm-fields" style="display:none;" class="input-group">
                <input type="text" id="cust-name" placeholder="Nombre del cliente (Obligatorio)" class="text-input" style="margin-bottom:8px;">
                <input type="tel" id="cust-phone" placeholder="Número Celular WhatsApp" class="text-input" style="margin-bottom:4px;">
            </div>
            <div id="delivery-fields" style="display:none;" class="input-group">
                <label>Monto de Delivery (S/.)</label>
                <input type="number" id="delivery-cost" value="0" min="0" class="text-input" style="margin-bottom:0;">
            </div>
        </div>

        <!-- Item Personalizado Rápido -->
        <div style="display: flex; gap: 8px; margin-bottom: 12px;">
            <input type="text" id="custom-item-name" placeholder="Ítem personalizado fuera de carta..." class="text-input" style="margin-bottom:0; flex:2;">
            <input type="number" id="custom-item-price" placeholder="S/." class="text-input" style="margin-bottom:0; flex:1;">
            <button class="btn btn-brand" onclick="addCustomItem()">+ Agregar</button>
        </div>

        <!-- Categorías de Menú -->
        <div class="cat-scroll">
            <button class="tag-btn selected" onclick="filterMenu('burgers', this)">Burgers</button>
            <button class="tag-btn" onclick="filterMenu('plato', this)">Al Plato</button>
            <button class="tag-btn" onclick="filterMenu('sharing', this)">Compartir</button>
            <button class="tag-btn" onclick="filterMenu('wings', this)">Alitas</button>
            <button class="tag-btn" onclick="filterMenu('antojos', this)">Antojos/Postres</button>
            <button class="tag-btn" onclick="filterMenu('refrescantes', this)">Refrescantes</button>
            <button class="tag-btn" onclick="filterMenu('bubble_tea', this)">Bubble Tea</button>
            <button class="tag-btn" onclick="filterMenu('cocteles', this)">Cocteles</button>
        </div>

        <!-- Grid de Productos -->
        <div class="grid-menu" id="menu-container"></div>

        <!-- Resumen de Pedido de la Mesa Actual -->
        <div style="margin-top: 20px; background: var(--bg-secondary); padding: 14px; border-radius: 12px;">
            <h3 style="font-size: 14px; text-transform: uppercase; margin-bottom: 8px; color: var(--text-muted)">Resumen de Comanda</h3>
            <div id="waiter-summary-list" style="font-size: 13px; margin-bottom: 12px;"></div>
            <div class="footer-actions">
                <button class="btn btn-danger" onclick="clearCurrentOrder()">Borrar</button>
                <button class="btn btn-muted" onclick="alert('Pre-cuenta impresa de manera simulada.')">Pre-Cuenta</button>
                <button class="btn btn-green" style="grid-column: span 2;" onclick="sendOrderToKitchen()">🚀 Enviar a Cocina</button>
            </div>
        </div>
    </main>

    <!-- ================= VISTA: COCINA (KDS) ================= -->
    <main id="view-cocina" class="view-panel">
        <div class="kds-container" id="kds-tickets-wrapper"></div>
    </main>

    <!-- ================= VISTA: CAJA (POS) ================= -->
    <main id="view-caja" class="view-panel">
        <div class="cat-scroll" style="border-bottom: 1px solid var(--bg-accent); padding-bottom:10px;">
            <button class="tag-btn selected" onclick="switchCajaTab('por-cobrar', this)">Por Cobrar</button>
            <button class="tag-btn" onclick="switchCajaTab('historial', this)">Historial</button>
            <button class="tag-btn" onclick="switchCajaTab('reportes', this)">Reportes e Ingresos</button>
        </div>

        <!-- Sub-Vista: Por Cobrar -->
        <div id="caja-por-cobrar" class="caja-subview">
            <div class="kds-container" id="caja-orders-wrapper"></div>
        </div>

        <!-- Sub-Vista: Historial -->
        <div id="caja-historial" class="caja-subview" style="display:none;">
            <div class="kds-container" id="caja-historial-wrapper"></div>
        </div>

        <!-- Sub-Vista: Reportes -->
        <div id="caja-reportes" class="caja-subview" style="display:none;">
            <div style="background: var(--bg-secondary); padding: 16px; border-radius:12px; margin-bottom: 15px;">
                <h3 style="margin-bottom:12px;">Filtros de Período</h3>
                <div class="options-list">
                    <button class="tag-btn selected" onclick="generateReport('hoy', this)">Hoy</button>
                    <button class="tag-btn" onclick="generateReport('ayer', this)">Solo Ayer</button>
                    <button class="tag-btn" onclick="generateReport('hoy+ayer', this)">Hoy + Ayer</button>
                    <button class="tag-btn" onclick="generateReport('3dias', this)">3 Días</button>
                    <button class="tag-btn" onclick="generateReport('30dias', this)">30 Días</button>
                </div>
                <div style="display:flex; gap:10px; align-items:center; margin-top:10px;">
                    <input type="date" id="rep-start" class="text-input" style="margin-bottom:0;">
                    <span>al</span>
                    <input type="date" id="rep-end" class="text-input" style="margin-bottom:0;">
                    <button class="btn btn-brand" onclick="generateReport('custom', null)">Filtrar Rango</button>
                </div>
                <button class="btn btn-danger" style="width:100%; margin-top:15px; font-size:12px;" onclick="clearDayHistory()">🗑️ Borrar Historial del Día</button>
            </div>

            <!-- Resultados del Reporte -->
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <div style="background: var(--bg-secondary); padding:16px; border-radius:12px; text-align:center;">
                    <span style="font-size:12px; color:var(--text-muted); text-transform:uppercase;">Venta Bruta Total</span>
                    <h2 id="rep-gross" style="color: var(--yellow-warn); font-size:28px; margin-top:5px;">S/ 0.00</h2>
                </div>
                <div style="background: var(--bg-secondary); padding:16px; border-radius:12px; text-align:center;">
                    <span style="font-size:12px; color:var(--text-muted); text-transform:u
